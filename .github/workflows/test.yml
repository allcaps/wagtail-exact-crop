name: Wagtail Exact Crop CI

on:
  push:
    branches:
      - main
      - "stable/**"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    name: Test

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[test]"

      - name: Run Django checks
        run: python tests/test_project/manage.py check

      - name: Check test project migrations
        run: python tests/test_project/manage.py makemigrations --check --dry-run

      - name: Run pytest
        run: pytest -q
